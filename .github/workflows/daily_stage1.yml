# Stage 1 — Keyword count scraper
#
# Runs twice daily at 5AM and 5PM BRT (Brazil UTC-3):
#   5AM  BRT = 08:00 UTC  →  results ready by 6AM BRT
#   5PM  BRT = 20:00 UTC  →  results ready by 6PM BRT
#
# IP rotation: each niche runs as a separate matrix job = separate GitHub runner = different IP.
# max-parallel: 1 + 5-min cooldown between niches prevents FB soft throttle.
#
# Required secret: DATABASE_URL (Supabase PostgreSQL connection string)

name: Stage 1 — Count Keywords

on:
  schedule:
    - cron: '0 8 * * *'    # 5AM BRT (morning run)
    - cron: '0 20 * * *'   # 5PM BRT (evening run)
  workflow_dispatch:
    inputs:
      niche:
        description: 'Single niche (leave empty for all)'
        required: false

jobs:
  count:
    name: count / ${{ matrix.niche }}
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        niche:
          - weight_loss
          - diabetes
          - ed
          - memory
          - back_pain
          - vision
          - prostate
          - sleep
          - blood_pressure
          - neuropathy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Cooldown between niches (5 min)
        if: matrix.niche != 'weight_loss'
        run: sleep 300

      - name: Run Stage 1 — ${{ matrix.niche }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m agents.count_agent \
            --niche ${{ matrix.niche }} \
            --country US \
            --delay 30
