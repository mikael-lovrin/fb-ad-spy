# Stage 1 — Keyword count scraper
#
# Runs twice daily at 5AM and 5PM BRT (Brazil UTC-3):
#   5AM  BRT = 08:00 UTC
#   5PM  BRT = 20:00 UTC
#
# IP rotation: each niche = separate matrix job = separate runner = different IP.
# max-parallel: 1 + 5-min cooldown prevents FB soft throttle.
#
# Required secret: DATABASE_URL (Supabase pooler connection string — NOT the direct URL)
# Use the Transaction pooler URL from Supabase → Settings → Database → Connection pooling
# Format: postgresql://postgres.[ref]:[pw]@aws-0-[region].pooler.supabase.com:6543/postgres

name: Stage 1 — Count Keywords

on:
  schedule:
    - cron: '0 8 * * *'    # 5AM BRT
    - cron: '0 20 * * *'   # 5PM BRT
  workflow_dispatch:
    inputs:
      niche:
        description: 'Single niche (leave empty for all)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warnings

jobs:
  count:
    name: count / ${{ matrix.niche }}
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        niche:
          - weight_loss
          - diabetes
          - ed
          - memory
          - back_pain
          - vision
          - prostate
          - sleep
          - blood_pressure
          - neuropathy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Cooldown between niches (5 min)
        if: matrix.niche != 'weight_loss'
        run: sleep 300

      - name: Run Stage 1 — ${{ matrix.niche }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m agents.count_agent \
            --niche ${{ matrix.niche }} \
            --country US \
            --delay 30
