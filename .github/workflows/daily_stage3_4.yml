# Stage 3 + 4 — Download media and analyze with Claude
#
# Runs once daily at 2PM BRT (17:00 UTC), after Stage 2 finishes.
# Stage 3: downloads video/image files for ads collected in Stage 2
# Stage 4: runs Claude analysis (copy, vision, Whisper transcription)
#
# Required secrets:
#   DATABASE_URL      — Supabase PostgreSQL connection string
#   ANTHROPIC_API_KEY — Claude API for copy + image analysis

name: Stage 3+4 — Download & Analyze

on:
  schedule:
    - cron: '0 17 * * *'   # 2PM BRT — runs after Stage 2 finishes
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max ads to analyze (default 50)'
        required: false
        default: '50'

jobs:
  download:
    name: Stage 3 — Download media
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stage 3 — download media
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m agents.download_agent \
            --limit ${{ github.event.inputs.limit || '200' }}

  analyze:
    name: Stage 4 — Claude analysis
    needs: download
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stage 4 — analyze with Claude
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.analyze_agent \
            --limit ${{ github.event.inputs.limit || '50' }}
