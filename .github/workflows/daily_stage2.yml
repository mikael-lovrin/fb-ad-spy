# Stage 2 — Individual ad metadata scraper
#
# Runs once daily at 10AM BRT (13:00 UTC), after Stage 1 morning run completes.
# Extracts individual ad metadata (publisher, copy, dates, collation_count, media URLs)
# for keywords with >= 5000 active ads in the latest Stage 1 snapshot.
#
# Required secret: DATABASE_URL

name: Stage 2 — Ad Metadata

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 13 * * *'   # 10AM BRT — runs after morning Stage 1 finishes
  workflow_dispatch:
    inputs:
      niche:
        description: 'Single niche (leave empty for all)'
        required: false
      min_ads:
        description: 'Min active ads threshold (default 5000)'
        required: false
        default: '5000'

jobs:
  metadata:
    name: metadata / ${{ matrix.niche }}
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        niche:
          - weight_loss
          - diabetes
          - ed
          - memory
          - back_pain
          - vision
          - prostate
          - sleep
          - blood_pressure
          - neuropathy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Cooldown between niches (10 min)
        if: matrix.niche != 'weight_loss'
        run: sleep 600

      - name: Run Stage 2 — ${{ matrix.niche }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m agents.metadata_agent \
            --niche ${{ matrix.niche }} \
            --count 100 \
            --min-ads ${{ github.event.inputs.min_ads || '5000' }}
