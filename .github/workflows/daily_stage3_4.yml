# Stage 3 — Claude analysis (download temp → analyze → delete media)
#
# Runs once daily at 2PM BRT (17:00 UTC), after Stage 2 finishes.
#
# No separate download stage: analyze_agent downloads media inline,
# runs Claude/Whisper analysis, then deletes the file immediately.
# Only text (transcript, analysis, hook, swipe_score) is stored in Supabase.
#
# Required secrets:
#   DATABASE_URL      — Supabase PostgreSQL connection string
#   ANTHROPIC_API_KEY — Claude API key
#
# Whisper transcription runs locally (faster-whisper, CPU) rather than via the
# OpenAI API — no OPENAI_API_KEY configured. Untested at this scale on a
# CPU-only GitHub runner; watch run duration and switch back to the API if
# the "small" model is too slow.

name: Stage 3 — Analyze Ads

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 17 * * *'   # 2PM BRT
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max ads to analyze (default 50)'
        required: false
        default: '50'
      min_days:
        description: 'Min days running (default 7)'
        required: false
        default: '7'

jobs:
  analyze:
    name: Analyze ads with Claude
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          apt-get install -y ffmpeg || true

      - name: Run Stage 3 — analyze
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          USE_LOCAL_WHISPER:  "true"   # faster-whisper, CPU — no OpenAI key configured
        run: |
          python -m agents.analyze_agent \
            --limit ${{ github.event.inputs.limit || '50' }} \
            --min-days ${{ github.event.inputs.min_days || '7' }}
