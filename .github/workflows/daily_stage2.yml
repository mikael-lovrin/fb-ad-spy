# Stage 2 — Individual ad metadata scraper (runs daily, after Stage 1)
#
# Only processes keywords that had >= 1000 active ads in the last Stage 1 run,
# keeping runtime and Supabase write volume manageable.
#
# Runs 2 hours after Stage 1 (4:00 AM UTC) to ensure Stage 1 has finished
# and the IP has had time to cool down.
#
# Secrets needed:
#   DATABASE_URL    → Supabase PostgreSQL connection string
#   ANTHROPIC_API_KEY → for copy analysis (Stage 4, optional here)

name: Stage 2 — Ad Metadata

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Single niche (leave empty for all)'
        required: false
      min_ads:
        description: 'Min active ads to process (default 1000)'
        required: false
        default: '1000'

jobs:
  metadata:
    name: metadata / ${{ matrix.niche }}
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        niche:
          - weight_loss
          - diabetes
          - ed
          - memory
          - back_pain
          - vision

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Cooldown between niches
        if: matrix.niche != 'weight_loss'
        run: sleep 600

      - name: Run Stage 2 — ${{ matrix.niche }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m agents.metadata_agent \
            --niche ${{ matrix.niche }} \
            --count 100 \
            --min-ads ${{ github.event.inputs.min_ads || '1000' }}
